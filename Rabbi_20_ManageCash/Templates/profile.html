<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ManageCash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
            text-align: center;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #5a6fd3;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .messages {
            margin-bottom: 20px;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        .profile-info {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .profile-info p {
            color: #666;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        
        <h2>Profile Management</h2>
        
        <div class="profile-info">
            <p><strong>Current Username:</strong> {{ user.username }}</p>
            <p><strong>Current Email:</strong> {{ user.email }}</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <label for="username">Username</label>
            <input type="text" name="username" id="username" value="{{ user.username }}" required>
            
            <label for="email">Email</label>
            <input type="email" name="email" id="email" value="{{ user.email }}" required>
            
            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" value="{{ user.first_name }}">
            
            <label for="last_name">Last Name</label>
            <input type="text" name="last_name" id="last_name" value="{{ user.last_name }}">
            
            <button type="submit">Update Profile</button>
        </form>
        
        <div class="links">
            <a href="{% url 'dashboard' %}">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
